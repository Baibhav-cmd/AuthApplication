spring:
  application:
    name: AuthApplicationBackend

  profiles:
    active:
      - dev


# database configure
  datasource:
      url: jdbc:mysql://localhost:3306/Authapplication?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      username: root
      password: 1166
      driver-class-name: com.mysql.cj.jdbc.Driver

      hikari:
          pool-name: MyHikariPool
          minimum-idle: 5           # min connections kept in pool
          maximum-pool-size: 10     # max connections allowed
          idle-timeout: 600000      # remove idle conn after 10 mins (ms)
          max-lifetime: 1800000     # max life of a connection = 30 mins (ms)
          connection-timeout: 30000 # wait 30s for a conn before throwing error
          connection-test-query: SELECT 1  # checks if connection is alive

# jpa nad hibernate configure
  jpa:
      hibernate:
        ddl-auto: update
      show-sql: true
      properties:
        hibernate:
          dialect: org.hibernate.dialect.MySQLDialect
          format_sql: true
      open-in-view: false

server:
    port: 8082

logging:
    level:
      org.hibernate.SQL: DEBUG
      org.hibernate.type.descriptor.sql.BasicBinder: TRACE